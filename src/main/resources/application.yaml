spring:
  application:
    name: wdusb-midterm
  profiles:
    active: dev

  main:
    web-application-type: servlet
    banner-mode: off
    log-startup-info: false

  jpa:
    open-in-view: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

server:
  compression:
    enabled: true
    mime-types:
      - text/html
      - text/css
      - application/javascript
    min-response-size: 1024


springdoc:
  packages-to-scan: tech.provokedynamic.wdusbmidterm.controller
  paths-to-match: /api/**
  remove-broken-reference-definitions: false
  pre-loading-enabled: false
  default-produces-media-type: application/json

gg:
  jte:
    template-location: src/main/kte
    template-suffix: .kte

---

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres

  jpa:
    properties:
      hibernate.format_sql: true

gg:
  jte:
    development-mode: true
    expose-request-attributes: true

---

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRES_URL}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      pool-name: LibSysPool

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

gg:
  jte:
    usePrecompiledTemplates: true